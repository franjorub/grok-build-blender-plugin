<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Grok Build × Blender Lab MCP Plugin">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="50%" stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <circle cx="180" cy="160" r="120" fill="#F97316" opacity="0.08"/>
  <circle cx="1020" cy="80" r="140" fill="#38BDF8" opacity="0.08"/>
  <circle cx="700" cy="260" r="100" fill="#E879F9" opacity="0.07"/>

  <!-- Grok wordmark (white) — path from Grok-3 logo -->
  <g transform="translate(150, 95) scale(3.2)">
    <path fill="#F5F5F5" d="M76.446 24.708V8.416h2.576v10.752l5.447-6.257h3.122l-4.9 5.362 4.945 6.435H84.56l-4.006-5.53-1.532-.01v5.54h-2.576zM68.636 24.982c-3.829 0-5.902-2.716-5.902-6.184 0-3.491 2.073-6.184 5.902-6.184 3.852 0 5.903 2.693 5.903 6.184 0 3.468-2.051 6.184-5.903 6.184zm-3.213-6.184c0 2.692 1.458 4.039 3.213 4.039 1.778 0 3.214-1.347 3.214-4.04 0-2.692-1.436-4.06-3.214-4.06-1.755 0-3.213 1.368-3.213 4.06zM55.566 24.708v-9.926l2.165-1.871h4.604v2.19H58.14v9.607h-2.575zM45.719 25.009c-4.909 0-7.836-3.564-7.836-8.424 0-4.906 3.032-8.557 7.931-8.557 3.83 0 6.633 1.962 7.294 5.613h-2.94c-.434-2.076-2.166-3.24-4.353-3.24-3.533 0-5.083 3.058-5.083 6.184 0 3.126 1.55 6.16 5.083 6.16 3.373 0 4.854-2.441 4.968-4.472H45.7v-2.362h7.68l-.013 1.235c0 4.59-1.87 7.863-7.65 7.863zM13.237 21.04l11.082-8.19c.543-.4 1.32-.244 1.578.38 1.363 3.288.754 7.241-1.957 9.955-2.71 2.714-6.482 3.31-9.93 1.954l-3.765 1.745c5.401 3.697 11.96 2.782 16.059-1.324 3.251-3.255 4.258-7.692 3.317-11.693l.008.009c-1.365-5.878.336-8.227 3.82-13.031.082-.114.165-.228.247-.345l-4.585 4.59v-.014L13.234 21.044M10.95 23.031c-3.877-3.707-3.208-9.446.1-12.755 2.446-2.449 6.454-3.448 9.952-1.979L24.76 6.56c-.677-.49-1.545-1.017-2.54-1.387A12.465 12.465 0 0 0 8.675 7.901c-3.519 3.523-4.625 8.94-2.725 13.561 1.42 3.454-.907 5.898-3.251 8.364-.83.874-1.664 1.748-2.335 2.674l10.583-9.466"/>
  </g>

  <text x="480" y="155" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="42" font-weight="300" fill="#6B7280">+</text>

  <!-- Blender mark -->
  <g transform="translate(540, 70)">
    <circle cx="60" cy="60" r="56" fill="#E87D0D"/>
    <ellipse cx="60" cy="60" rx="40" ry="16" fill="none" stroke="#fff" stroke-width="6" opacity="0.95"/>
    <ellipse cx="60" cy="60" rx="16" ry="40" fill="none" stroke="#fff" stroke-width="6" opacity="0.95" transform="rotate(60 60 60)"/>
    <ellipse cx="60" cy="60" rx="16" ry="40" fill="none" stroke="#fff" stroke-width="6" opacity="0.95" transform="rotate(-60 60 60)"/>
    <circle cx="60" cy="60" r="10" fill="#fff"/>
  </g>

  <text x="740" y="155" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="40" font-weight="300" fill="#6B7280">→</text>

  <!-- MCP mark -->
  <g transform="translate(800, 70)">
    <rect width="120" height="120" rx="26" fill="#0F172A" stroke="#38BDF8" stroke-width="2"/>
    <path d="M28 74V46l32-16 32 16v28l-32 16-32-16z" fill="none" stroke="#38BDF8" stroke-width="4"/>
    <circle cx="60" cy="58" r="6" fill="#F0F9FF"/>
    <text x="60" y="104" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" fill="#7DD3FC">MCP</text>
  </g>

  <text x="600" y="250" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="34" font-weight="700" fill="#F9FAFB" filter="url(#glow)">Grok Build × Blender Lab MCP</text>
  <text x="600" y="288" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" fill="#9CA3AF">Control a live Blender session from Grok via Model Context Protocol</text>
  <rect x="420" y="300" width="360" height="4" rx="2" fill="url(#accent)" opacity="0.9"/>
</svg>
