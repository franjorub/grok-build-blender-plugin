<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Grok Build × Blender Lab MCP">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090B"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="50%" stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <!-- Official Grok wordmark path (worldvectorlogo Grok-3), white -->
    <g id="grok-wordmark">
      <path fill="#FFFFFF" d="M76.446 24.708V8.416h2.576v10.752l5.447-6.257h3.122l-4.9 5.362 4.945 6.435H84.56l-4.006-5.53-1.532-.01v5.54h-2.576zM68.636 24.982c-3.829 0-5.902-2.716-5.902-6.184 0-3.491 2.073-6.184 5.902-6.184 3.852 0 5.903 2.693 5.903 6.184 0 3.468-2.051 6.184-5.903 6.184zm-3.213-6.184c0 2.692 1.458 4.039 3.213 4.039 1.778 0 3.214-1.347 3.214-4.04 0-2.692-1.436-4.06-3.214-4.06-1.755 0-3.213 1.368-3.213 4.06zM55.566 24.708v-9.926l2.165-1.871h4.604v2.19H58.14v9.607h-2.575zM45.719 25.009c-4.909 0-7.836-3.564-7.836-8.424 0-4.906 3.032-8.557 7.931-8.557 3.83 0 6.633 1.962 7.294 5.613h-2.94c-.434-2.076-2.166-3.24-4.353-3.24-3.533 0-5.083 3.058-5.083 6.184 0 3.126 1.55 6.16 5.083 6.16 3.373 0 4.854-2.441 4.968-4.472H45.7v-2.362h7.68l-.013 1.235c0 4.59-1.87 7.863-7.65 7.863zM13.237 21.04l11.082-8.19c.543-.4 1.32-.244 1.578.38 1.363 3.288.754 7.241-1.957 9.955-2.71 2.714-6.482 3.31-9.93 1.954l-3.765 1.745c5.401 3.697 11.96 2.782 16.059-1.324 3.251-3.255 4.258-7.692 3.317-11.693l.008.009c-1.365-5.878.336-8.227 3.82-13.031.082-.114.165-.228.247-.345l-4.585 4.59v-.014L13.234 21.044M10.95 23.031c-3.877-3.707-3.208-9.446.1-12.755 2.446-2.449 6.454-3.448 9.952-1.979L24.76 6.56c-.677-.49-1.545-1.017-2.54-1.387A12.465 12.465 0 0 0 8.675 7.901c-3.519 3.523-4.625 8.94-2.725 13.561 1.42 3.454-.907 5.898-3.251 8.364-.83.874-1.664 1.748-2.335 2.674l10.583-9.466"/>
    </g>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <circle cx="160" cy="120" r="140" fill="#F97316" opacity="0.07"/>
  <circle cx="1040" cy="240" r="160" fill="#38BDF8" opacity="0.07"/>

  <!-- Top brand row: large readable Grok wordmark -->
  <rect x="80" y="48" width="1040" height="140" rx="24" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>

  <!-- Grok wordmark: viewBox of path ~ 0 0 88 32 → scale to ~320×116 -->
  <g transform="translate(140, 78) scale(3.6)">
    <use href="#grok-wordmark"/>
  </g>

  <!-- Divider + -->
  <text x="560" y="135" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="48" font-weight="200" fill="#9CA3AF">+</text>

  <!-- Blender orange badge -->
  <g transform="translate(620, 68)">
    <circle cx="50" cy="50" r="48" fill="#E87D0D"/>
    <ellipse cx="50" cy="50" rx="34" ry="13" fill="none" stroke="#FFFFFF" stroke-width="5"/>
    <ellipse cx="50" cy="50" rx="13" ry="34" fill="none" stroke="#FFFFFF" stroke-width="5" transform="rotate(60 50 50)"/>
    <ellipse cx="50" cy="50" rx="13" ry="34" fill="none" stroke="#FFFFFF" stroke-width="5" transform="rotate(-60 50 50)"/>
    <circle cx="50" cy="50" r="8" fill="#FFFFFF"/>
  </g>

  <text x="780" y="135" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="42" font-weight="200" fill="#9CA3AF">→</text>

  <!-- MCP badge -->
  <g transform="translate(840, 68)">
    <rect width="100" height="100" rx="22" fill="#0F172A" stroke="#38BDF8" stroke-width="2.5"/>
    <path d="M22 64V38l28-14 28 14v26l-28 14-28-14z" fill="none" stroke="#38BDF8" stroke-width="3.5"/>
    <circle cx="50" cy="50" r="5" fill="#E0F2FE"/>
    <text x="50" y="90" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7DD3FC">MCP</text>
  </g>

  <!-- Title block -->
  <text x="600" y="250" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="36" font-weight="700" fill="#F9FAFB">Grok Build × Blender Lab MCP</text>
  <text x="600" y="290" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="17" fill="#9CA3AF">Control a live Blender session from Grok via Model Context Protocol</text>
  <rect x="420" y="312" width="360" height="4" rx="2" fill="url(#accent)"/>
</svg>
